name: questlog
description: Gamified habit tracker with pop culture badges
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado
  flutter_riverpod: ^2.6.1

  # Banco local
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navegação
  go_router: ^14.2.7

  # UI
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  lottie: ^3.1.2

  # Utils
  uuid: ^4.4.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/badges/
    - assets/lottie/  